<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>寒江演武赛程抽签</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            height: 100%;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            min-height: 100%;
            background-image: url('微信图片_20260722115841_33385_1534.jpg');
            background-size: 120% 120%;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            padding: 20px;
            padding-top: 8vh;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .matches-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding-bottom: 100px;
        }
        .match-box {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid rgba(255, 215, 0, 0.4);
            border-radius: 12px;
            padding: 12px 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            transition: all 0.4s ease;
            opacity: 0.5;
        }
        .match-box.filled {
            opacity: 1;
            border-color: rgba(255, 215, 0, 0.8);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }
        .match-header {
            font-size: 14px;
            color: rgba(255, 215, 0, 0.7);
            margin-bottom: 12px;
            font-weight: 600;
            letter-spacing: 2px;
        }
        .match-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .team-name {
            font-size: 20px;
            color: #ffd700;
            font-weight: 700;
            min-height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .vs {
            font-size: 14px;
            color: rgba(255, 215, 0, 0.6);
            font-weight: 700;
            letter-spacing: 3px;
            padding: 5px 0;
        }
        .team-name.empty {
            color: rgba(255, 215, 0, 0.2);
            font-style: italic;
        }
        .team-name.bye {
            color: #4ade80;
            background: rgba(74, 222, 128, 0.2);
            padding: 4px 12px;
            border-radius: 6px;
        }
        .button-area {
            position: fixed;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            padding: 0 20px;
            z-index: 100;
        }
        button {
            background: linear-gradient(135deg, #ffd700 0%, #daa520 100%);
            color: #1a1a1a;
            border: none;
            padding: 15px 45px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.5);
            letter-spacing: 2px;
            min-width: 200px;
        }
        button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.6);
        }
        button:active:not(:disabled) {
            transform: translateY(-1px);
        }
        button:disabled {
            background: linear-gradient(135deg, #a0aec0 0%, #718096 100%);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
            text-align: center;
            z-index: 100;
        }
        .status-text {
            font-size: 14px;
            color: #ffd700;
            font-weight: 500;
        }
        .status-text.error {
            color: #ef4444;
        }
        .status-text.success {
            color: #4ade80;
        }
    </style>
</head>
<body>
    <div class="status-bar">
        <span class="status-text" id="status">正在加载数据...</span>
    </div>
    
    <div class="header">
        <h1>寒江演武抽签</h1>
    </div>
    
    <div class="matches-container" id="matchesContainer"></div>
    
    <div class="button-area">
        <button id="generateBtn" onclick="drawMatches()" disabled>开始抽签</button>
    </div>

    <script>
        let allRecords = [];
        let matches = [];
        const API_TOKEN = "uskNUrvWvJoD3VuQ5zW7GYH";
        const DATASHEET_ID = "dstkLYv4iqNWmnWAkz";
        const VIEW_ID = "viwilzoq1fHp3";

        async function loadRecords() {
            const statusEl = document.getElementById('status');
            const btnEl = document.getElementById('generateBtn');
            statusEl.textContent = '正在加载数据...';
            statusEl.className = 'status-text';
            btnEl.disabled = true;
            
            try {
                const url = `https://api.vika.cn/fusion/v1/datasheets/${DATASHEET_ID}/records?viewId=${VIEW_ID}&pageSize=1000`;
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${API_TOKEN}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const result = await response.json();
                
                if (result.success) {
                    allRecords = result.data.records;
                    initMatches();
                    const totalMatches = Math.ceil(allRecords.length / 2);
                    statusEl.textContent = `已加载 ${allRecords.length} 个参赛选手，共 ${totalMatches} 场比赛`;
                    statusEl.className = 'status-text success';
                    if (allRecords.length >= 2) {
                        btnEl.disabled = false;
                    } else {
                        statusEl.textContent = '参赛选手不足，无法抽签';
                        statusEl.className = 'status-text error';
                    }
                } else {
                    throw new Error(result.message || '请求失败');
                }
            } catch (error) {
                console.error(error);
                statusEl.textContent = `加载失败: ${error.message}`;
                statusEl.className = 'status-text error';
            }
        }

        function initMatches() {
            matches = [];
            const container = document.getElementById('matchesContainer');
            container.innerHTML = '';
            
            const totalMatches = Math.ceil(allRecords.length / 2);
            
            for (let i = 1; i <= totalMatches; i++) {
                matches.push({
                    id: i,
                    teamA: null,
                    teamB: null,
                    teamARecordId: null,
                    teamBRecordId: null
                });
                
                const box = document.createElement('div');
                box.className = 'match-box';
                box.id = `match-${i}`;
                box.innerHTML = `
                    <div class="match-header">第 ${i} 场</div>
                    <div class="match-content">
                        <div class="team-name empty">等待抽签</div>
                        <div class="vs">VS</div>
                        <div class="team-name empty">等待抽签</div>
                    </div>
                `;
                container.appendChild(box);
            }
        }

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        async function deleteRecords(recordIds) {
            if (recordIds.length === 0) return;
            
            try {
                const url = `https://api.vika.cn/fusion/v1/datasheets/${DATASHEET_ID}/records/batchDelete`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ recordIds })
                });
                
                const result = await response.json();
                console.log('删除API响应:', result);
            } catch (error) {
                console.error('删除请求异常:', error);
            }
        }

        async function drawMatches() {
            const btnEl = document.getElementById('generateBtn');
            const statusEl = document.getElementById('status');
            
            btnEl.disabled = true;
            statusEl.textContent = '正在抽签，请稍候...';
            statusEl.className = 'status-text';
            
            if (allRecords.length < 2) {
                statusEl.textContent = '参赛选手不足，无法抽签';
                statusEl.className = 'status-text error';
                return;
            }
            
            try {
                const shuffledRecords = shuffleArray(allRecords);
                const recordsToDelete = [];
                const totalMatches = matches.length;
                
                for (let i = 0; i < totalMatches; i++) {
                    const recordA = shuffledRecords[i * 2];
                    const recordB = shuffledRecords[i * 2 + 1];
                    
                    if (recordA) {
                        matches[i].teamA = recordA.fields['order'];
                        matches[i].teamARecordId = recordA.recordId;
                        recordsToDelete.push(recordA.recordId);
                    }
                    
                    if (recordB) {
                        matches[i].teamB = recordB.fields['order'];
                        matches[i].teamBRecordId = recordB.recordId;
                        recordsToDelete.push(recordB.recordId);
                    }
                    
                    const box = document.getElementById(`match-${i + 1}`);
                    if (box) {
                        box.className = 'match-box filled';
                        const content = box.querySelector('.match-content');
                        
                        const teamAClass = matches[i].teamA ? '' : 'bye';
                        const teamAText = matches[i].teamA || '轮空晋级';
                        const teamBClass = matches[i].teamB ? '' : 'bye';
                        const teamBText = matches[i].teamB || '轮空晋级';
                        
                        content.innerHTML = `
                            <div class="team-name ${teamAClass}">${teamAText}</div>
                            <div class="vs">VS</div>
                            <div class="team-name ${teamBClass}">${teamBText}</div>
                        `;
                    }
                    
                    await new Promise(resolve => setTimeout(resolve, 600));
                }
                
                allRecords = allRecords.filter(r => !recordsToDelete.includes(r.recordId));
                const filledCount = matches.filter(m => m.teamA || m.teamB).length;
                statusEl.textContent = `抽签完成！共生成 ${filledCount} 场比赛`;
                statusEl.className = 'status-text success';
                
                const batchSize = 5;
                for (let i = 0; i < recordsToDelete.length; i += batchSize) {
                    const batch = recordsToDelete.slice(i, Math.min(i + batchSize, recordsToDelete.length));
                    await deleteRecords(batch);
                    await new Promise(resolve => setTimeout(resolve, 300));
                }
                
                await new Promise(resolve => setTimeout(resolve, 1000));
                await createMatchRecords(matches);
            } catch (error) {
                console.error(error);
                statusEl.textContent = `抽签失败: ${error.message}`;
                statusEl.className = 'status-text error';
            }
        }

        async function createMatchRecords(matchesList) {
            const statusEl = document.getElementById('status');
            const TOKEN = "uskNUrvWvJoD3VuQ5zW7GYH";
            const DATASHEET_ID = "dstgE4eYXvlwZxf4zU";
            
            statusEl.textContent = '正在保存赛程结果...';
            
            const recordsToCreate = matchesList.filter(m => m.teamA || m.teamB).map((m, index) => ({
                fields: {
                    ordercode: `第${index + 1}场: ${m.teamA || '轮空晋级'} VS ${m.teamB || '轮空晋级'}`
                }
            }));
            
            const batchSize = 10;
            for (let i = 0; i < recordsToCreate.length; i += batchSize) {
                const batch = recordsToCreate.slice(i, Math.min(i + batchSize, recordsToCreate.length));
                
                try {
                    const url = `https://api.vika.cn/fusion/v1/datasheets/${DATASHEET_ID}/records`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${TOKEN}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ records: batch })
                    });
                    
                    const result = await response.json();
                    console.log('创建记录响应:', result);
                } catch (error) {
                    console.error('创建记录异常:', error);
                }
                
                await new Promise(resolve => setTimeout(resolve, 500));
            }
            
            statusEl.textContent = '赛程已保存！';
            statusEl.className = 'status-text success';
        }

        window.onload = loadRecords;
    </script>
</body>
</html>

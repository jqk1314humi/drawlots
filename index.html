<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寒江演武32进16抽签系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            background-image: url('微信图片_20260722115841_33385_1534.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            padding: 20px;
            padding-top: 10vh;
        }
        .container {
            background: rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(5px);
            padding: 25px 20px;
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            border: 2px solid rgba(255, 215, 0, 0.5);
            text-align: center;
            max-width: 500px;
            width: 100%;
            animation: fadeInUp 0.6s ease-out;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        h1 {
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            margin-bottom: 25px;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .matches-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 5px;
            margin-bottom: 25px;
        }
        .matches-grid::-webkit-scrollbar {
            width: 4px;
        }
        .matches-grid::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 2px;
        }
        .matches-grid::-webkit-scrollbar-thumb {
            background: rgba(255, 215, 0, 0.5);
            border-radius: 2px;
        }
        .match-box {
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 10px;
            padding: 12px;
            transition: all 0.3s ease;
        }
        .match-box.filled {
            border-color: rgba(255, 215, 0, 0.8);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }
        .match-header {
            font-size: 12px;
            color: rgba(255, 215, 0, 0.6);
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .match-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .team-name {
            font-size: 18px;
            color: #ffd700;
            font-weight: 600;
            min-height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .vs {
            font-size: 12px;
            color: rgba(255, 215, 0, 0.5);
            font-weight: 700;
            letter-spacing: 2px;
        }
        .team-name.empty {
            color: rgba(255, 215, 0, 0.2);
            font-style: italic;
        }
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            background: linear-gradient(135deg, #ffd700 0%, #daa520 100%);
            color: #1a1a1a;
            border: none;
            padding: 12px 30px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
            letter-spacing: 0.5px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.5);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            background: linear-gradient(135deg, #a0aec0 0%, #718096 100%);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            margin-top: 20px;
            font-size: 14px;
            padding: 12px 20px;
            border-radius: 8px;
            display: inline-block;
            min-width: 200px;
        }
        .error {
            background-color: #fff5f5;
            color: #c53030;
            border: 1px solid #feb2b2;
        }
        .success {
            background-color: #f0fff4;
            color: #276749;
            border: 1px solid #9ae6b4;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>寒江演武32进16抽签</h1>
        <div class="matches-grid" id="matchesGrid"></div>
        <div class="button-group">
            <button id="generateBtn" onclick="drawMatches()" disabled>开始抽签</button>
        </div>
        <div class="status" id="status"></div>
    </div>

    <script>
        let allRecords = [];
        let matches = [];
        const API_TOKEN = "uskNUrvWvJoD3VuQ5zW7GYH";
        const DATASHEET_ID = "dstkLYv4iqNWmnWAkz";
        const VIEW_ID = "viwilzoq1fHp3";
        const TOTAL_MATCHES = 20;

        async function loadRecords() {
            const statusEl = document.getElementById('status');
            const btnEl = document.getElementById('generateBtn');
            statusEl.textContent = '正在加载数据...';
            btnEl.disabled = true;
            
            try {
                const url = `https://api.vika.cn/fusion/v1/datasheets/${DATASHEET_ID}/records?viewId=${VIEW_ID}&pageSize=1000`;
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${API_TOKEN}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const result = await response.json();
                
                if (result.success) {
                    allRecords = result.data.records;
                    initMatches();
                    statusEl.textContent = `已加载 ${allRecords.length} 个参赛选手，共 ${TOTAL_MATCHES} 场比赛`;
                    statusEl.className = 'status success';
                    if (allRecords.length >= 2) {
                        btnEl.disabled = false;
                    } else {
                        statusEl.textContent = '参赛选手不足，无法抽签';
                        statusEl.className = 'status error';
                    }
                } else {
                    throw new Error(result.message || '请求失败');
                }
            } catch (error) {
                console.error(error);
                statusEl.textContent = `加载失败: ${error.message}`;
                statusEl.className = 'status error';
            }
        }

        function initMatches() {
            matches = [];
            const grid = document.getElementById('matchesGrid');
            grid.innerHTML = '';
            
            for (let i = 1; i <= TOTAL_MATCHES; i++) {
                matches.push({
                    id: i,
                    teamA: null,
                    teamB: null,
                    teamARecordId: null,
                    teamBRecordId: null
                });
                
                const box = document.createElement('div');
                box.className = 'match-box';
                box.id = `match-${i}`;
                box.innerHTML = `
                    <div class="match-header">第 ${i} 场</div>
                    <div class="match-content">
                        <div class="team-name empty">等待抽签</div>
                        <div class="vs">VS</div>
                        <div class="team-name empty">等待抽签</div>
                    </div>
                `;
                grid.appendChild(box);
            }
        }

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        async function deleteRecords(recordIds) {
            if (recordIds.length === 0) return true;
            
            try {
                const url = `https://api.vika.cn/fusion/v1/datasheets/${DATASHEET_ID}/records`;
                const response = await fetch(url, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${API_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ recordIds })
                });
                
                const result = await response.json();
                return result.success;
            } catch (error) {
                console.error('删除失败:', error);
                return false;
            }
        }

        async function drawMatches() {
            const btnEl = document.getElementById('generateBtn');
            const statusEl = document.getElementById('status');
            
            btnEl.disabled = true;
            statusEl.textContent = '正在抽签，请稍候...';
            statusEl.className = 'status';
            
            if (allRecords.length < 2) {
                statusEl.textContent = '参赛选手不足，无法抽签';
                statusEl.className = 'status error';
                return;
            }
            
            try {
                const shuffledRecords = shuffleArray(allRecords);
                const recordsToDelete = [];
                
                for (let i = 0; i < TOTAL_MATCHES && i * 2 + 1 < shuffledRecords.length; i++) {
                    const recordA = shuffledRecords[i * 2];
                    const recordB = shuffledRecords[i * 2 + 1];
                    
                    matches[i].teamA = recordA.fields['order'];
                    matches[i].teamB = recordB.fields['order'];
                    matches[i].teamARecordId = recordA.recordId;
                    matches[i].teamBRecordId = recordB.recordId;
                    
                    recordsToDelete.push(recordA.recordId, recordB.recordId);
                    
                    const box = document.getElementById(`match-${i + 1}`);
                    if (box) {
                        box.className = 'match-box filled';
                        const content = box.querySelector('.match-content');
                        content.innerHTML = `
                            <div class="team-name">${matches[i].teamA || '未知'}</div>
                            <div class="vs">VS</div>
                            <div class="team-name">${matches[i].teamB || '未知'}</div>
                        `;
                    }
                    
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
                
                statusEl.textContent = '抽签完成，正在删除已抽取选手...';
                
                const deleteSuccess = await deleteRecords(recordsToDelete);
                
                if (deleteSuccess) {
                    allRecords = allRecords.filter(r => !recordsToDelete.includes(r.recordId));
                    const filledCount = matches.filter(m => m.teamA && m.teamB).length;
                    statusEl.textContent = `抽签完成！共生成 ${filledCount} 场比赛，剩余 ${allRecords.length} 个选手`;
                    statusEl.className = 'status success';
                } else {
                    statusEl.textContent = '抽签完成，但删除记录失败，请手动处理';
                    statusEl.className = 'status error';
                }
            } catch (error) {
                console.error(error);
                statusEl.textContent = `抽签失败: ${error.message}`;
                statusEl.className = 'status error';
            }
        }

        window.onload = loadRecords;
    </script>
</body>
</html>
